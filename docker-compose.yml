services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdlc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdlc}
      POSTGRES_DB: ${POSTGRES_DB:-sdlc}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdlc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sdlc}:${POSTGRES_PASSWORD:-sdlc}@postgres:5432/${POSTGRES_DB:-sdlc}
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./seed:/seed:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
