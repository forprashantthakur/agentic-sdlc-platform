databases:
  - name: sdlc-db
    databaseName: sdlc
    user: sdlc
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: sdlc-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sdlc-db
          property: connectionString
      - key: MOCK_MODE
        value: "true"
      - key: APP_ENV
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
